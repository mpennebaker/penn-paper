<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Logo — penn&amp;paper games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #FAFAF7;
      --surface: #FFFFFF;
      --text:    #111111;
      --muted:   #666660;
      --border:  #E5E5E0;
      --ink:     #16A34A;
      --ink-dark:#14401E;
      --dark:    #111111;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 56px 24px 80px;
      -webkit-font-smoothing: antialiased;
    }
    .page-header { max-width: 760px; margin: 0 auto 56px; }
    .page-header h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.5rem; letter-spacing: -0.025em; margin-bottom: 8px; }
    .page-header p  { color: var(--muted); font-size: 0.95rem; }

    .wrap { max-width: 760px; margin: 0 auto; display: grid; gap: 16px; }

    .row-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: -4px;
      padding-left: 2px;
    }

    .card {
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card--light { background: var(--bg); border: 1px solid var(--border); }
    .card--dark  { background: var(--dark); }
    .card--large { padding: 64px 48px; }
    .card--medium { padding: 40px 40px; }
    .card--small  { padding: 24px 32px; }

    .two-up {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
  </style>
</head>
<body>

<header class="page-header">
  <h1>penn&amp;paper games — Final Logo</h1>
  <p>J1 nib width (20px shoulder) · Bottle green ink · Corrected brand name. Shown at hero, card, and header/favicon scale.</p>
</header>

<div class="wrap">

  <p class="row-label">Hero scale · light</p>
  <div class="card card--light card--large">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 108" width="280" height="108">
      <!-- Nib: J1 shoulder (20px), bottle green body, centred at x=24 -->
      <path d="M 14,17 L 18,4 L 30,4 L 34,17 L 24,74 Z" fill="#14401E"/>
      <!-- Slit -->
      <line x1="24" y1="10" x2="24" y2="67" stroke="#FAFAF7" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Vent hole -->
      <circle cx="24" cy="30" r="3.5" fill="#FAFAF7"/>
      <!-- Ink drop at tip -->
      <circle cx="24" cy="72" r="3" fill="#16A34A"/>
      <!-- Vertical drop to underline -->
      <line x1="24" y1="76" x2="24" y2="84" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Horizontal underline -->
      <line x1="24" y1="84" x2="272" y2="84" stroke="#16A34A" stroke-width="2"/>
      <!-- Wordmark -->
      <text y="78" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="26" fill="#14401E" letter-spacing="-0.5">
        <tspan x="50">penn</tspan><tspan fill="#16A34A">&amp;</tspan><tspan fill="#14401E">paper</tspan>
      </text>
      <!-- GAMES -->
      <text x="51" y="100" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="12" fill="#666666" letter-spacing="2.5">GAMES</text>
    </svg>
  </div>

  <p class="row-label">Hero scale · dark</p>
  <div class="card card--dark card--large">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 108" width="280" height="108">
      <path d="M 14,17 L 18,4 L 30,4 L 34,17 L 24,74 Z" fill="#D1FAE5"/>
      <line x1="24" y1="10" x2="24" y2="67" stroke="#14401E" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="24" cy="30" r="3.5" fill="#14401E"/>
      <circle cx="24" cy="72" r="3" fill="#34D399"/>
      <line x1="24" y1="76" x2="24" y2="84" stroke="#34D399" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="24" y1="84" x2="272" y2="84" stroke="#34D399" stroke-width="2"/>
      <text y="78" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="26" fill="#FFFFFF" letter-spacing="-0.5">
        <tspan x="50">penn</tspan><tspan fill="#34D399">&amp;</tspan><tspan fill="#FFFFFF">paper</tspan>
      </text>
      <text x="51" y="100" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="12" fill="#AAAAAA" letter-spacing="2.5">GAMES</text>
    </svg>
  </div>

  <p class="row-label">Card / nav scale</p>
  <div class="two-up">
    <div class="card card--light card--medium">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 88" width="216" height="88">
        <path d="M 10,14 L 14,3 L 26,3 L 30,14 L 20,60 Z" fill="#14401E"/>
        <line x1="20" y1="8"  x2="20" y2="54" stroke="#FAFAF7" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="20" cy="24" r="3" fill="#FAFAF7"/>
        <circle cx="20" cy="58" r="2.5" fill="#16A34A"/>
        <line x1="20" y1="61" x2="20" y2="68" stroke="#16A34A" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="68" x2="208" y2="68" stroke="#16A34A" stroke-width="2"/>
        <text y="62" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="20" fill="#14401E" letter-spacing="-0.5">
          <tspan x="40">penn</tspan><tspan fill="#16A34A">&amp;</tspan><tspan fill="#14401E">paper</tspan>
        </text>
        <text x="41" y="82" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="11" fill="#666666" letter-spacing="2">GAMES</text>
      </svg>
    </div>
    <div class="card card--dark card--medium">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 216 88" width="216" height="88">
        <path d="M 10,14 L 14,3 L 26,3 L 30,14 L 20,60 Z" fill="#D1FAE5"/>
        <line x1="20" y1="8"  x2="20" y2="54" stroke="#14401E" stroke-width="1.2" stroke-linecap="round"/>
        <circle cx="20" cy="24" r="3" fill="#14401E"/>
        <circle cx="20" cy="58" r="2.5" fill="#34D399"/>
        <line x1="20" y1="61" x2="20" y2="68" stroke="#34D399" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="68" x2="208" y2="68" stroke="#34D399" stroke-width="2"/>
        <text y="62" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="20" fill="#FFFFFF" letter-spacing="-0.5">
          <tspan x="40">penn</tspan><tspan fill="#34D399">&amp;</tspan><tspan fill="#FFFFFF">paper</tspan>
        </text>
        <text x="41" y="82" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="11" fill="#AAAAAA" letter-spacing="2">GAMES</text>
      </svg>
    </div>
  </div>

  <p class="row-label">Small / header scale</p>
  <div class="two-up">
    <div class="card card--light card--small">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 48" width="156" height="48">
        <path d="M 5,8 L 7,2 L 13,2 L 15,8 L 10,32 Z" fill="#14401E"/>
        <line x1="10" y1="4" x2="10" y2="29" stroke="#FAFAF7" stroke-width="0.8" stroke-linecap="round"/>
        <circle cx="10" cy="13" r="1.8" fill="#FAFAF7"/>
        <circle cx="10" cy="31" r="1.5" fill="#16A34A"/>
        <line x1="10" y1="33" x2="10" y2="37" stroke="#16A34A" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="37" x2="150" y2="37" stroke="#16A34A" stroke-width="1.5"/>
        <text y="34" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="13" fill="#14401E" letter-spacing="-0.3">
          <tspan x="24">penn</tspan><tspan fill="#16A34A">&amp;</tspan><tspan fill="#14401E">paper</tspan>
        </text>
        <text x="25" y="46" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="7" fill="#666666" letter-spacing="1.5">GAMES</text>
      </svg>
    </div>
    <div class="card card--dark card--small">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 156 48" width="156" height="48">
        <path d="M 5,8 L 7,2 L 13,2 L 15,8 L 10,32 Z" fill="#D1FAE5"/>
        <line x1="10" y1="4" x2="10" y2="29" stroke="#14401E" stroke-width="0.8" stroke-linecap="round"/>
        <circle cx="10" cy="13" r="1.8" fill="#14401E"/>
        <circle cx="10" cy="31" r="1.5" fill="#34D399"/>
        <line x1="10" y1="33" x2="10" y2="37" stroke="#34D399" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="10" y1="37" x2="150" y2="37" stroke="#34D399" stroke-width="1.5"/>
        <text y="34" font-family="Space Grotesk, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF" letter-spacing="-0.3">
          <tspan x="24">penn</tspan><tspan fill="#34D399">&amp;</tspan><tspan fill="#FFFFFF">paper</tspan>
        </text>
        <text x="25" y="46" font-family="Space Grotesk, sans-serif" font-weight="500" font-size="7" fill="#AAAAAA" letter-spacing="1.5">GAMES</text>
      </svg>
    </div>
  </div>

</div>

</body>
</html>
